<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Find Grab & Eatz at Memorial Trail Ice House in Houston.">
<title>Location — Grab & Eatz</title>
<style>
  :root {
    --charcoal: #1C1C1C;
    --green: #2D5A3D;
    --gold: #D4924A;
    --cream: #F5F0E8;
    --red: #C41E3A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--charcoal);
    color: var(--cream);
    font-family: 'Arial', sans-serif;
    line-height: 1.5;
  }

  a { color: var(--gold); text-decoration: none; }
  a:hover { text-decoration: underline; }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 2rem;
    height: 60px;
    background: rgba(28,28,28,0.95);
    border-bottom: 1px solid rgba(212,146,74,0.2);
    z-index: 100;
  }

  .nav-logo {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .nav-links {
    display: flex;
    gap: 2rem;
  }

  .nav-links a {
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cream);
    opacity: 0.8;
  }

  .nav-links a:hover, .nav-links a.active { opacity: 1; color: var(--gold); }

  main {
    padding: 6rem 2rem 4rem;
    max-width: 800px;
    margin: 0 auto;
  }

  h1 {
    font-size: 3rem;
    font-weight: 900;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 3rem;
  }

  .info-section {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(212,146,74,0.15);
    padding: 2rem;
    margin-bottom: 1.5rem;
  }

  .info-section h2 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    opacity: 0.6;
    margin-bottom: 0.5rem;
  }

  .info-section p {
    font-size: 1.3rem;
    font-weight: 500;
  }

  .cta-buttons {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
  }

  .btn {
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 1rem 2rem;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--red);
    color: var(--cream);
  }

  .btn-primary:hover { background: #a01830; }

  .btn-secondary {
    background: transparent;
    color: var(--cream);
    border: 1px solid var(--gold);
  }

  .btn-secondary:hover { background: var(--gold); color: var(--charcoal); }

  footer {
    padding: 2rem;
    text-align: center;
    border-top: 1px solid rgba(212,146,74,0.2);
    font-size: 0.85rem;
    opacity: 0.5;
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">GRAB & EATZ</a>
  <div class="nav-links">
    <a href="/menu.html">MENU</a>
    <a href="/location.html" class="active">LOCATION</a>
    <a href="/story.html">STORY</a>
  </div>
</nav>

<main>
  <h1>FIND US</h1>
  
  <div class="info-section">
    <h2>LOCATION</h2>
    <p>Memorial Trail Ice House</p>
    <p>Houston, TX</p>
  </div>

  <div class="info-section">
    <h2>PHONE</h2>
    <p><a href="tel:+1-346-380-0865">(346) 380-0865</a></p>
  </div>

  <div class="info-section">
    <h2>HOURS</h2>
    <p>Tue-Thu: 11am – 9pm</p>
    <p>Fri-Sa: 11am – 10pm</p>
    <p>Sun: 11am – 8pm</p>
    <p>Mon: Closed</p>
  </div>

  <div class="cta-buttons">
    <a href="https://www.ubereats.com/store/grab-and-eatz" target="_blank" class="btn btn-primary">ORDER UBER EATS</a>
    <a href="https://memorialtrail.com" target="_blank" class="btn btn-secondary">MEMORIAL TRAIL</a>
  </div>
</main>

<footer>
  <p><a href="https://memorialtrail.com">← MEMORIAL TRAIL ICE HOUSE</a></p>
</footer>

</body>
</html>
