<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Find Grab & Eatz at Memorial Trail Ice House in Houston.">
<title>Location — Grab & Eatz</title>
<style>
  :root {
    --black: #000000;
    --white: #FFFFFF;
    --red: #FF0000;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--white);
    color: var(--black);
    font-family: 'Courier New', monospace;
    font-weight: 400;
    line-height: 1.4;
  }

  a { color: var(--black); text-decoration: none; }
  a:hover { text-decoration: underline; }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: stretch;
    border-bottom: 4px solid var(--black);
    position: sticky;
    top: 0;
    background: var(--white);
    z-index: 100;
  }

  .nav-brand {
    font-size: 1.5rem;
    font-weight: 700;
    padding: 1rem 2rem;
    border-right: 4px solid var(--black);
    background: var(--black);
    color: var(--white);
  }

  .nav-links {
    display: flex;
    flex-grow: 1;
  }

  .nav-links a {
    display: flex;
    align-items: center;
    padding: 0 2rem;
    font-size: 1rem;
    font-weight: 700;
    text-transform: uppercase;
    border-right: 4px solid var(--black);
    transition: background 0.1s, color 0.1s;
  }

  .nav-links a:hover {
    background: var(--black);
    color: var(--white);
    text-decoration: none;
  }

  .nav-links a.active {
    background: var(--black);
    color: var(--white);
  }

  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: calc(100vh - 56px - 80px);
  }

  .info {
    padding: 4rem;
    border-right: 4px solid var(--black);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  h1 {
    font-size: 4rem;
    font-weight: 900;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .info-section {
    margin-bottom: 2rem;
  }

  .info-section h2 {
    font-size: 0.9rem;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 0.5rem;
  }

  .info-section p {
    font-size: 1.5rem;
    font-weight: 700;
  }

  .cta-buttons {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
  }

  .btn {
    font-size: 1rem;
    font-weight: 700;
    text-transform: uppercase;
    padding: 1rem 2rem;
    border: 4px solid var(--black);
    background: var(--black);
    color: var(--white);
    cursor: pointer;
  }

  .btn:hover {
    background: var(--white);
    color: var(--black);
  }

  .map-placeholder {
    background: var(--black);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--white);
    font-size: 1.5rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  footer {
    padding: 2rem;
    border-top: 4px solid var(--black);
    text-align: center;
    font-weight: 700;
  }

  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; }
    .info { border-right: none; border-bottom: 4px solid var(--black); }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">GRAB & EATZ</a>
  <div class="nav-links">
    <a href="/menu.html">MENU</a>
    <a href="/location.html" class="active">LOCATION</a>
    <a href="/story.html">STORY</a>
  </div>
</nav>

<main>
  <div class="info">
    <h1>FIND US</h1>
    
    <div class="info-section">
      <h2>Location</h2>
      <p>Memorial Trail Ice House</p>
      <p>Houston, TX</p>
    </div>

    <div class="info-section">
      <h2>Phone</h2>
      <p><a href="tel:+1-346-380-0865">(346) 380-0865</a></p>
    </div>

    <div class="info-section">
      <h2>Hours</h2>
      <p>Tue-Thu: 11am – 9pm</p>
      <p>Fri-Sa: 11am – 10pm</p>
      <p>Sun: 11am – 8pm</p>
      <p>Mon: Closed</p>
    </div>

    <div class="cta-buttons">
      <a href="https://www.ubereats.com/store/grab-and-eatz" target="_blank" class="btn">ORDER UBER EATS</a>
      <a href="https://memorialtrail.com" target="_blank" class="btn">MEMORIAL TRAIL</a>
    </div>
  </div>

  <div class="map-placeholder">
    [MAP]
  </div>
</main>

<footer>
  <p><a href="https://memorialtrail.com">← BACK TO MEMORIAL TRAIL</a></p>
</footer>

</body>
</html>
